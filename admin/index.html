<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Trap Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar">
        <div id="navbar-content">
            <h1 id="navbar-title">Graph Trap Admin</h1>
            <div id="navbar-buttons">
                <a id="home-link" href="../index.html">Play</a>
                <a id="config-link" href="../config/index.html">Config Creator</a>
            </div>
        </div>
    </nav>

    <main id="admin-main">
        <section id="admin-login" class="admin-card">
            <h2>Admin Sign In</h2>
            <p>Enter the admin password to access database controls.</p>
            <input id="admin-password" type="password" placeholder="Admin password">
            <button id="admin-login-btn">Sign In</button>
            <p id="login-error" class="admin-error"></p>
        </section>

        <section id="admin-panel" class="admin-panel" hidden>

            <div class="admin-card">
                <p id="aws-status" class="admin-status"></p>
                <div class="admin-section-header">
                    <h2>Configs</h2>
                    <div class="header-actions">
                        <button id="refresh-configs">Refresh Configs</button>
                        <button id="open-add-config-btn">Add Config</button>
                    </div>
                </div>
                <table id="configs-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="admin-card">
                <div class="admin-section-header">
                    <h2>Viewer Data</h2>
                    <button id="refresh-scores">Load All Entries</button>
                </div>
                <div id="score-summary" class="admin-data-block">
                    <p>No viewer data loaded yet.</p>
                </div>
                <div id="config-viewer-details" class="admin-data-block"></div>
            </div>
        </section>
    </main>

    <!-- Add Config Modal -->
    <div id="add-config-modal" class="modal-overlay" hidden>
        <div class="modal-box admin-card">
            <div class="modal-header">
                <h3>Add New Config</h3>
                <button id="close-modal-btn" class="modal-close" aria-label="Close">✕</button>
            </div>
            <label>Config JSON file
                <input id="config-file-input" type="file" accept=".json">
            </label>
            <label>Start time
                <input id="config-start" type="datetime-local">
            </label>
            <label>End time
                <input id="config-end" type="datetime-local">
            </label>
            <div class="modal-footer">
                <button id="config-add-btn" class="btn-primary">Upload &amp; Add Config</button>
                <p id="config-add-status" class="admin-status"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
