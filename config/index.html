<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Config Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Game Config Editor</h1>
    <div id="editor-container">
        <div id="graph-display"></div>
        <div id="controls">
            <button id="add-node">Add Node</button>
            <button id="connect-nodes">Connect Selected Nodes</button>
            <button id="toggle-edge">Toggle Edge</button>
            <button id="add-agent">Toggle Agent</button>
            <button id="add-target">Toggle Target</button>
            <button id="save-config">Save Config</button>
            <p id="instructions">Click "Add Node" then click on the graph to place nodes. Select nodes to connect or modify. Drag nodes to move them (not in add mode).</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
